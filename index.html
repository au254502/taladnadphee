<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตลาดนัดผี - ระบบพรีออเดอร์</title>
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f5f6fa; margin: 0; }
    header { background-color: #4b0082; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; }
    nav a { color: white; margin: 0 10px; text-decoration: none; }
    .container { display: flex; justify-content: space-around; margin: 20px; }
    .section { background: white; border-radius: 8px; padding: 20px; width: 45%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    .status-pending { color: #ff9800; font-weight: bold; }
    .status-approved { color: #4caf50; font-weight: bold; }
    .status-rejected { color: #f44336; font-weight: bold; }
    button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
    .approve { background-color: #4caf50; color: white; }
    .reject { background-color: #f44336; color: white; }
    .submit { background-color: #4b0082; color: white; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>ตลาดนัดผี</h1>
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">คำสั่งซื้อ</a>
      <a href="#">สินค้า</a>
      <a href="#">ลูกค้า</a>
      <span>Admin</span>
    </nav>
  </header>

  <div class="container">
    <!-- ฝั่งลูกค้า -->
    <div class="section">
      <h2>ฟอร์มพรีออเดอร์เสื้อ</h2>
      <form id="orderForm">
        <label>ชื่อ:</label><br>
        <input type="text" name="customer_name" required><br><br>

        <label>เลือกไซส์:</label><br>
        <select name="size">
          <option value="S">S</option><option value="M">M</option>
          <option value="L">L</option><option value="XL">XL</option>
        </select><br><br>

        <label>เลือกสี:</label><br>
        <select name="color">
          <option value="white">ขาว</option><option value="black">ดำ</option>
          <option value="blue">น้ำเงิน</option>
        </select><br><br>

        <label>เลือกเนื้อผ้า:</label><br>
        <select name="fabric">
          <option value="cotton">Cotton</option><option value="dryfit">Dry-fit</option>
        </select><br><br>

        <label>อัปโหลดใบเสร็จ:</label><br>
        <input type="file" name="receipt" accept=".jpg,.png,.pdf" required><br><br>

        <button type="submit" class="submit">ส่งคำสั่งซื้อ</button>
      </form>
    </div>

    <!-- ฝั่ง Admin -->
    <div class="section">
      <h2>Dashboard Admin</h2>
      <table id="ordersTable">
        <tr>
          <th>ชื่อลูกค้า</th><th>รายละเอียดสินค้า</th><th>สถานะ</th><th>ดำเนินการ</th>
        </tr>
      </table>
    </div>
  </div>

  <script>
    const orders = [];

    document.getElementById('orderForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const form = e.target;
      const newOrder = {
        customer_name: form.customer_name.value,
        size: form.size.value,
        color: form.color.value,
        fabric: form.fabric.value,
        status: 'pending'
      };
      orders.push(newOrder);
      renderOrders();
      alert("ส่งคำสั่งซื้อเรียบร้อย! ทีมงานตลาดนัดผีจะตรวจสอบใบเสร็จของคุณ");
      form.reset();
    });

    function renderOrders() {
      const table = document.getElementById('ordersTable');
      table.innerHTML = `
        <tr>
          <th>ชื่อลูกค้า</th><th>รายละเอียดสินค้า</th><th>สถานะ</th><th>ดำเนินการ</th>
        </tr>`;
      orders.forEach((order, index) => {
        table.innerHTML += `
          <tr>
            <td>${order.customer_name}</td>
            <td>ไซส์ ${order.size}, สี ${order.color}, ${order.fabric}</td>
            <td class="status-${order.status}">${order.status}</td>
            <td>
              <button class="approve" onclick="updateStatus(${index}, 'approved')">อนุมัติ</button>
              <button class="reject" onclick="updateStatus(${index}, 'rejected')">ปฏิเสธ</button>
            </td>
          </tr>`;
      });
    }

    function updateStatus(index, status) {
      orders[index].status = status;
      renderOrders();
      alert(`คำสั่งซื้อของ ${orders[index].customer_name} ถูกเปลี่ยนสถานะเป็น ${status}`);
    }
  </script>
</body>
</html>
